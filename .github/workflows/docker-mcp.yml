name: Build MCP Server Image

on:
  # Monthly rebuild to refresh SEC company dataset
  schedule:
    - cron: '0 6 1 * *'  # 6am UTC on the 1st of each month
  # Manual trigger
  workflow_dispatch:
  # Build on push when Dockerfile or MCP server code changes
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'edgar/ai/mcp/**'
      - '.github/workflows/docker-mcp.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sapientsai/edgartools-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
